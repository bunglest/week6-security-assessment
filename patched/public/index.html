<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow (Patched)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f2f5; color: #1a1a2e; }
    header { background: #1b4332; color: white; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.2rem; letter-spacing: 1px; }
    .badge { background: #40916c; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
    #user-info { font-size: 0.85rem; opacity: 0.8; }
    .container { max-width: 860px; margin: 32px auto; padding: 0 16px; }
    .card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 20px; }
    h2 { font-size: 1rem; margin-bottom: 16px; color: #1b4332; }
    input, textarea { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; margin-bottom: 10px; }
    button { padding: 9px 20px; background: #1b4332; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #081c15; }
    button.danger { background: #c0392b; }
    .task-item { border: 1px solid #e8e8e8; border-radius: 6px; padding: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; }
    .task-body { flex: 1; }
    .task-id { font-size: 0.75rem; color: #888; margin-bottom: 4px; }
    .task-title { font-weight: 600; margin-bottom: 4px; }
    .task-desc { font-size: 0.85rem; color: #555; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { padding: 8px 18px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; background: white; color: #1b4332; font-size: 0.85rem; font-weight: 500; min-width: 90px; }
    .tab:hover { background: #f0f7f3; }
    .tab.active { background: #1b4332; color: white; border-color: #1b4332; }
    #auth-section, #app-section { display: none; }
    .row { display: flex; gap: 10px; }
    .row input { flex: 1; }
    .msg { padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; margin-top: 8px; }
    .msg.error { background: #fdecea; color: #c0392b; }
    .msg.success { background: #e8f5e9; color: #2e7d32; }
    .fix-note { font-size: 0.75rem; color: #40916c; font-weight: 400; }
  </style>
</head>
<body>
<header>
  <h1>TaskFlow <span class="badge">PATCHED</span></h1>
  <span id="user-info"></span>
</header>

<div class="container">
  <div id="auth-section">
    <div class="tabs">
      <button class="tab active" id="btn-tab-login">Login</button>
      <button class="tab" id="btn-tab-register">Register</button>
    </div>

    <div id="login-tab" class="card">
      <h2>Login</h2>
      <input id="login-user" type="text" placeholder="Username" />
      <input id="login-pass" type="password" placeholder="Password" />
      <button id="btn-login">Login</button>
      <div id="login-msg"></div>
    </div>

    <div id="register-tab" class="card" style="display:none">
      <h2>Register</h2>
      <input id="reg-user" type="text" placeholder="Username" />
      <input id="reg-pass" type="password" placeholder="Password (min 8 chars)" />
      <button id="btn-register">Register</button>
      <div id="reg-msg"></div>
    </div>
  </div>

  <div id="app-section">
    <div class="card">
      <h2>Create Task</h2>
      <input id="task-title" type="text" placeholder="Task title" />
      <textarea id="task-desc" rows="2" placeholder="Description"></textarea>
      <button id="btn-add-task">Add Task</button>
      <div id="task-msg"></div>
    </div>

    <div class="card">
      <h2>My Tasks</h2>
      <div id="task-list"></div>
    </div>

    <div class="card">
      <h2>
        Fetch Task by ID
        <span class="fix-note"> — FIX: ownership check prevents IDOR</span>
      </h2>
      <div class="row">
        <input id="idor-id" type="number" placeholder="Task ID" />
        <button id="btn-fetch">Fetch</button>
      </div>
      <div id="idor-result" style="margin-top:10px;font-size:0.85rem"></div>
    </div>

    <div class="card">
      <h2>
        Upload Attachment
        <span class="fix-note"> — FIX: only jpg/png/gif/pdf allowed, 5 MB max</span>
      </h2>
      <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.gif,.pdf" />
      <button id="btn-upload" style="margin-top:6px">Upload</button>
      <div id="upload-msg"></div>
    </div>

    <div style="text-align:right">
      <button class="danger" id="btn-logout">Logout</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
